name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'

permissions:
  contents: read

jobs:
  spec:
    name: ci / spec
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Check specs
        run: node scripts/check-specs.mjs

      - name: Check traceability
        run: node scripts/check-traceability.mjs

      - name: Check release workflow
        run: node scripts/verify-release.mjs

  format:
    name: ci / format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format
        run: pnpm format:check

  lint:
    name: ci / lint
    runs-on: ubuntu-24.04
