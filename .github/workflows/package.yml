name: package

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'

permissions:
  contents: read

jobs:
  macos:
    name: package / macos
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check Git flow ref
        run: pnpm gitflow:check

      - name: Setup Forge packaging Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.2.0

      - name: Package Electron app
        run: node scripts/package-electron-forge.mjs --platform=darwin --arch=arm64 --out=apps/desktop/out

      - name: Smoke packaged app
        run: pnpm package:smoke

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: slack-reply-board-macos
          path: apps/desktop/out
          if-no-files-found: error
