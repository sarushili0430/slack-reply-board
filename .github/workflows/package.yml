name: package

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  macos:
    name: package / macos
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package Electron app
        run: pnpm --filter @replyboard/desktop package

      - name: Normalize package output
        run: |
          if [ ! -d out/desktop ] || [ -z "$(find out/desktop -mindepth 1 -maxdepth 1 -print -quit)" ]; then
            package_dir="$(find "$RUNNER_WORKSPACE" -maxdepth 8 -type d -name '@replyboard-desktop-*' -print -quit)"
            if [ -z "$package_dir" ]; then
              find "$RUNNER_WORKSPACE" -maxdepth 8 -type d -print
              exit 1
            fi
            mkdir -p out/desktop
            cp -R "$package_dir" out/desktop/
          fi
          find out/desktop -maxdepth 3 -print

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: slack-reply-board-macos
          path: out/desktop
          if-no-files-found: error
