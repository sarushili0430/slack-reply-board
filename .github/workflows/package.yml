name: package

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'hotfix/**'

permissions:
  contents: read

jobs:
  macos:
    name: package / macos
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 11.9.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Package Electron app
        run: |
          pnpm --filter @replyboard/desktop package -- --platform=darwin --arch=arm64
          for attempt in $(seq 1 90); do
            if [ -d apps/desktop/out ] && [ -n "$(find apps/desktop/out -mindepth 1 -maxdepth 1 -print -quit)" ]; then
              find apps/desktop/out -maxdepth 3 -print
              exit 0
            fi
            sleep 2
          done
          find apps/desktop/out -maxdepth 3 -print

      - name: Smoke packaged app
        run: pnpm package:smoke

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: slack-reply-board-macos
          path: apps/desktop/out
          if-no-files-found: error
